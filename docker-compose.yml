services:
  # ===== Infrastructure =====
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog-server
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

  # ===== Backend =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.docker
    ports:
      - "3001:3001"
    depends_on:
      - mongo
      - mailhog
      - ollama
    restart: unless-stopped
    # If you have uploads at runtime, mount a volume:
    # volumes:
    #   - ./backend/uploads:/app/uploads

  # ===== Admin (static nginx) =====
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        # Vite build-time variable
        VITE_API_BASE_URL: "http://localhost:3001"
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ===== Frontend (static nginx) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Vite build-time variable
        VITE_API_URL: "http://localhost:3001/api"
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  mongo_data: