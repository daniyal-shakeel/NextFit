services:
  # Ollama: local LLM for AI description suggestions. After first start, pull a model:
  #   docker compose exec ollama ollama pull tinyllama
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog-server
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped

volumes:
  ollama_data:
  mongo_data:
